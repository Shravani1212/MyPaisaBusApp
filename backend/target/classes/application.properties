# Server Port
server.port=8080

# Default in-memory database for local development
spring.datasource.url=jdbc:h2:mem:busdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.mypaisa.bus=DEBUG

# Use Postgres by running with profile postgres:
# mvn spring-boot:run -Dspring-boot.run.profiles=postgres
